<header class="site-header" [class.site-header--scrolled]="isScrolled()">
  <nav class="header-nav">
    <a (click)="scrollToTop()" style="cursor:pointer">
      <img ngSrc="/assets/logo.webp" alt="Media Alacarte" height="44" width="160" />
    </a>

    <div class="header-nav__links">
      @for (link of navLinks(); track link.label) {
        <button type="button"
           class="nav-link"
           [class.nav-link--active]="activeSection() === link.sectionId"
           (click)="scrollTo(link.sectionId)">
          {{ link.label }}
        </button>
      }
    </div>

    <div class="header-nav__actions">
      <button type="button" class="btn-theme-toggle" [class.is-bursting]="themeBurst()" (click)="toggleTheme()">
        <span class="material-symbols-outlined" [class.btn-theme-toggle__icon--spin]="themeBurst()">
          {{ theme.isDark() ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>
      <button type="button" class="btn-login">Login</button>
      <button type="button" class="btn-demo">Request a Demo</button>
    </div>

    <button type="button"
            class="mobile-menu-toggle"
            (click)="toggleMobileMenu()">
      <span class="material-symbols-outlined">
        {{ mobileMenuOpen() ? 'close' : 'menu' }}
      </span>
    </button>
  </nav>

  @if (mobileMenuOpen()) {
    <nav id="mobile-nav" class="mobile-nav">
      @for (link of navLinks(); track link.label) {
        <button type="button"
           class="mobile-nav__link"
           [class.mobile-nav__link--active]="activeSection() === link.sectionId"
           (click)="scrollTo(link.sectionId)">
          {{ link.label }}
        </button>
      }
      <div class="mobile-nav__footer">
        <button type="button" class="mobile-nav__theme-toggle" (click)="theme.toggle()">
          <span class="material-symbols-outlined">
            {{ theme.isDark() ? 'light_mode' : 'dark_mode' }}
          </span>
          {{ theme.isDark() ? 'Light Mode' : 'Dark Mode' }}
        </button>
      </div>
    </nav>
  }
</header>
