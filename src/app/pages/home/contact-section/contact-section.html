<section id="contact" class="contact-section">
  <div class="contact-section__inner">
    <div class="contact-section__header" scrollReveal>
      <div class="badge badge--primary">
        <span class="badge__text">Get In Touch</span>
      </div>
      <h2 class="contact-section__title">Ready to <span class="contact-section__title-gradient">Grow?</span></h2>
      <p class="contact-section__description">
        Fill out the form below and our team will get back to you within 24 hours.
      </p>
    </div>

    <div class="contact-section__content" scrollReveal revealDirection="up" [revealDelay]="200">
      @if (submitted()) {
      <div class="contact-success" scrollReveal revealDirection="fade">
        <div class="contact-success__icon-wrap">
          <span class="material-symbols-outlined contact-success__icon">check_circle</span>
        </div>
        <h3 class="contact-success__title">Message Sent!</h3>
        <p class="contact-success__text">Thank you for reaching out. We'll be in touch shortly.</p>
        <button type="button" class="contact-success__btn" (click)="submitted.set(false)">Send Another</button>
      </div>
      } @else {
      <form class="contact-form" (submit)="onSubmit($event)">
        <div class="contact-form__grid">
          <div class="contact-form__group">
            <label for="name" class="contact-form__label">Full Name</label>
            <input type="text" id="name" name="name" class="contact-form__input" placeholder="John Doe" required />
          </div>
          <div class="contact-form__group">
            <label for="email" class="contact-form__label">Email Address</label>
            <input type="email" id="email" name="email" class="contact-form__input" placeholder="john@example.com"
              required />
          </div>
        </div>
        <div class="contact-form__group">
          <label for="message" class="contact-form__label">Message</label>
          <textarea id="message" name="message" class="contact-form__input contact-form__input--textarea"
            placeholder="Tell us about your project..." required></textarea>
        </div>

        <button type="submit" class="contact-form__submit" [disabled]="sending()">
          @if (sending()) {
          <span class="contact-form__spinner"></span>
          Sending...
          } @else {
          Send Message
          <span class="material-symbols-outlined">send</span>
          }
        </button>
      </form>
      }
    </div>
  </div>
</section>
