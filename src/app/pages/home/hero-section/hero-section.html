<section class="hero-section">
  <!-- Glow effects -->
  <div class="hero-section__glow hero-section__glow--primary"></div>
  <div class="hero-section__glow hero-section__glow--secondary"></div>

  <div class="hero-section__inner">
    <!-- Copy -->
    <div class="hero-section__copy">
      <div class="badge">
        <span class="badge__text"><span class="badge__accent">#1</span> Media Marketplace for Advertisers & Agencies</span>
      </div>

      <span class="hero-section__topheading">
        Bigger Impact.
      </span>

      <h1 class="hero-section__heading">
        Stronger <br />
        <span class="hero-section__heading-gradient">Campaigns</span>
      </h1>

      <h2 class="hero-section__subheading">
        Smarter Media Buying.
      </h2>

      <div class="hero-section__actions">
        <button type="button" class="btn-primary">Start your journey!</button>
        <button type="button" class="btn-glass">
          <span class="material-symbols-outlined">play_circle</span>
          Learn More
        </button>
      </div>
    </div>

    <!-- Hero image -->
    <div class="hero-section__visual">
      <div class="hero-section__visual-glow"></div>
      <div class="hero-section__image-wrapper">
        <picture class="hero-section__picture">
          <source media="(max-width: 767px)" srcset="/assets/hero-mobile.webp">
          <img ngSrc="/assets/hero.webp"
               fill
               priority
               alt="Diverse team of media professionals high-fiving in a modern office"
               class="hero-section__image" />
        </picture>

        <!-- Dashboard overlay -->
        <div class="hero-section__overlay glass-card">
          <div class="hero-section__overlay-inner">
            <div>
              <p class="hero-section__overlay-label">Live Dashboard</p>
              <p class="hero-section__overlay-value">Campaign Performance: +24%</p>
            </div>
            <div class="hero-section__overlay-icon">
              <span class="material-symbols-outlined">trending_up</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-marquee-ribbons />
</section>
