<section id="hero" class="hero-section">
  <!-- Glow effects -->
  <div class="hero-section__glow hero-section__glow--primary"></div>
  <div class="hero-section__glow hero-section__glow--secondary"></div>

  <div class="hero-section__inner">
    <!-- Copy -->
    <div class="hero-section__copy">
      <div scrollReveal revealDirection="up" [revealDelay]="1800">
        <div class="badge">
          <span class="badge__text"><span class="badge__accent">#1</span> Media Marketplace for Advertisers &
            Agencies</span>
        </div>
      </div>

      <span scrollReveal revealDirection="up" [revealDelay]="1950" class="hero-section__topheading">
        Bigger Impact.
      </span>

      <h1 scrollReveal revealDirection="up" [revealDelay]="2100" class="hero-section__heading">
        Stronger <br />
        <span class="hero-section__heading-gradient">Campaigns</span>
      </h1>

      <h2 scrollReveal revealDirection="up" [revealDelay]="2250" class="hero-section__subheading">
        Smarter Media Buying.
      </h2>

      <div scrollReveal revealDirection="up" [revealDelay]="2400" class="hero-section__actions">
        <button type="button" class="btn-primary">Start your journey!</button>
        <button type="button" class="btn-glass">
          <span class="material-symbols-outlined">play_circle</span>
          Learn More
        </button>
      </div>
    </div>

    <!-- Interactive Dashboard Skeleton -->
    <div class="hero-section__visual">
      <div class="hero-section__visual-glow"></div>

      <div scrollReveal revealDirection="right" [revealDelay]="2000" class="hero-section__dashboard-wrapper">
        <div class="hero-section__dashboard">

          <!-- Top bar -->
          <div class="hero-section__dashboard-top">
            <div class="hero-section__dashboard-title">Media Command Center</div>
            <div class="hero-section__dashboard-dots">
              <span class="hero-section__dashboard-dot" appTooltip="Close"></span>
              <span class="hero-section__dashboard-dot" appTooltip="Minimize"></span>
              <span class="hero-section__dashboard-dot" appTooltip="Expand"></span>
            </div>
          </div>

          <div class="hero-section__dashboard-body">

            <!-- Left Panel: Channels -->
            <div class="hero-section__dashboard-channels">
              <!-- Channel: Digital -->
              <div class="hero-section__dashboard-channel" appTooltip="Programmatic & Social Feed Integration">
                <div class="hero-section__channel-icon"><span class="material-symbols-outlined">language</span></div>
                <div class="hero-section__channel-info">
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--short"></div>
                  <div class="hero-section__channel-bar">
                    <div class="hero-section__channel-fill" style="width: 75%;"></div>
                  </div>
                </div>
              </div>
              <!-- Channel: TV -->
              <div class="hero-section__dashboard-channel" appTooltip="Broadcast & Streaming Analytics">
                <div class="hero-section__channel-icon"><span class="material-symbols-outlined">live_tv</span></div>
                <div class="hero-section__channel-info">
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--short"></div>
                  <div class="hero-section__channel-bar">
                    <div class="hero-section__channel-fill hero-section__channel-fill--alt" style="width: 55%;"></div>
                  </div>
                </div>
              </div>
              <!-- Channel: Radio -->
              <div class="hero-section__dashboard-channel" appTooltip="Audio & Podcast Performance">
                <div class="hero-section__channel-icon"><span class="material-symbols-outlined">podcasts</span></div>
                <div class="hero-section__channel-info">
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--short"></div>
                  <div class="hero-section__channel-bar">
                    <div class="hero-section__channel-fill" style="width: 35%;"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right Panel: Data Flow & AI Core -->
            <div class="hero-section__dashboard-main">
              <!-- AI Core Pulsing -->
              <div class="hero-section__dashboard-core" appTooltip="Neural Core: Cross-platform ROI Optimization">
                <div class="hero-section__core-pulse"></div>
                <div class="hero-section__core-icon"><span class="material-symbols-outlined">psychology</span></div>
              </div>

              <!-- Data lines flowing from Core using percentage-based SVG -->
              <svg class="hero-section__dashboard-svg" preserveAspectRatio="none">
                <!-- Top Line Path -->
                <g class="hero-section__flow-group">
                  <line class="hero-section__flow-hit-area" x1="0" y1="50%" x2="100%" y2="15%" />
                  <line class="hero-section__flow-line" x1="0" y1="50%" x2="100%" y2="15%" />
                </g>

                <!-- Middle Line Path -->
                <g class="hero-section__flow-group">
                  <line class="hero-section__flow-hit-area" x1="0" y1="50%" x2="100%" y2="50%" />
                  <line class="hero-section__flow-line" x1="0" y1="50%" x2="100%" y2="50%" />
                </g>

                <!-- Bottom Line Path -->
                <g class="hero-section__flow-group">
                  <line class="hero-section__flow-hit-area" x1="0" y1="50%" x2="100%" y2="85%" />
                  <line class="hero-section__flow-line" x1="0" y1="50%" x2="100%" y2="85%" />
                </g>

                <!-- Data nodes -->
                <circle class="hero-section__flow-node" cx="100%" cy="15%" r="4" />
                <circle class="hero-section__flow-node" cx="100%" cy="50%" r="4" />
                <circle class="hero-section__flow-node" cx="100%" cy="85%" r="4" />
              </svg>

              <!-- Skeleton Metrics on the right -->
              <div class="hero-section__dashboard-metrics">
                <div class="hero-section__metric-card" appTooltip="Conversion Rate Optimization Trend">
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--tiny"></div>
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--medium"></div>
                </div>
                <div class="hero-section__metric-card" appTooltip="Audience Reach & Frequency Analysis">
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--tiny"></div>
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--medium"></div>
                </div>
                <div class="hero-section__metric-card" appTooltip="Real-time Budget Allocation Efficiency">
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--tiny"></div>
                  <div class="hero-section__skeleton-text hero-section__skeleton-text--medium"></div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Dashboard overlay -->
      <div class="hero-section__overlay-wrapper" scrollReveal revealDirection="up"
        [revealDelay]="isMobile() ? 200 : 2000">
        <div class="hero-section__dashboard-overlay glass-card">
          <div class="hero-section__overlay-inner">
            <div>
              <p class="hero-section__overlay-label">Live AI Optimization</p>
              <p class="hero-section__overlay-value">Routing Budget: +24% ROI</p>
            </div>
            <div class="hero-section__overlay-icon">
              <span class="material-symbols-outlined">auto_awesome</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-marquee-ribbons />
</section>
