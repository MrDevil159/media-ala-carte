<section class="cta-section">
  <div class="cta-section__inner">
    <h2 id="cta-heading" scrollReveal class="cta-section__heading">
      Supercharge Your <br />
      <span class="cta-section__heading-gradient">Media Strategy</span> <br />
      With our 100% efficiency
    </h2>

    <ul class="cta-section__list" scrollReveal [revealDelay]="140">
      <li class="cta-section__list-item">
        <span class="cta-section__list-number">#1</span>
        <span class="cta-section__list-text">Plan, Book, and Manage Campaigns</span>
      </li>
      <li class="cta-section__list-item">
        <span class="cta-section__list-number">#2</span>
        <span class="cta-section__list-text">Maximize Reach and ROI</span>
      </li>
    </ul>

    <div class="cta-section__action" scrollReveal [revealDelay]="260">
      <button type="button" class="cta-section__btn">
        Optimize Your Media Today
        <span class="cta-section__btn-arrow material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </div>
</section>
