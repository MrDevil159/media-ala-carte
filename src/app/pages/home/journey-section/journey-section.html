<section class="journey-section">
  <div class="journey-section__inner">
    <!-- Outer frame: positions buttons, no overflow clipping -->
    <div class="journey-section__frame">

      <!-- Image wrapper: clips image to rounded corners -->
      <div class="journey-section__image-wrap">
        <img
          class="journey-section__image"
          src="https://images.unsplash.com/photo-1556761175-b413da4baf72?w=1200&auto=format&fit=crop"
          alt="Two professionals celebrating a successful media campaign partnership"
          width="1200"
          height="700"
        />
      </div>

      <!-- Top-left notch: half above image edge -->
      <div class="journey-section__notch journey-section__notch--top-left">
        <button class="journey-section__btn-primary" type="button">
          Start your journey!
        </button>
      </div>

      <!-- Bottom-right notch: half below image edge -->
      <div class="journey-section__notch journey-section__notch--bottom-right">
        <button class="journey-section__btn-secondary" type="button">
          <span class="journey-section__btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </span>
          <span>Learn More</span>
        </button>
      </div>

    </div>
  </div>
</section>
